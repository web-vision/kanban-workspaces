<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Header">
    <!-- Top Navigation Bar -->
    <header class="workspace-header">
        <div class="header-content">
            <div class="header-left">
                <div class="typo3-logo">
                    <span class="logo-icon">T3</span>
                </div>
                <h1 class="header-title">Workspace Board</h1>
            </div>

            <div class="header-center">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="globalSearch" placeholder="Search records..." class="search-input">
                    <button class="search-clear" id="clearSearch" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div class="header-right">
                <button class="filter-toggle" id="filterToggle">
                    <i class="fas fa-filter"></i>
                    <span>Filters</span>
                </button>
            </div>
        </div>
    </header>
</f:section>

<f:section name="Content">
    <!-- Main Content Area -->
    <main class="workspace-main">
        <f:if condition="{workspaceIsAccessible}">
            <div class="container mt-5">
                <f:be.infobox title="Wait!">You're on live workspace, Please select workspace.</f:be.infobox>
            </div>
        </f:if>
        <f:if condition="{showNoCustomStagesWarning}">
            <div class="container mt-3">
                <f:be.infobox
                    title="{f:translate(key: 'warning.noCustomStages.title', extensionName: 'kanban_workspaces')}">
                    <f:translate key="warning.noCustomStages.message" extensionName="kanban_workspaces" />
                </f:be.infobox>
            </div>
        </f:if>

        <!-- Kanban board web component. Registered by @web-vision/kanban-workspaces/App.js
             and initialised from window.WorkspaceConfig. Renders the filter sidebar, the
             board columns/cards and the preview / send-to-stage / assign modals. -->
        <typo3-kanban-board></typo3-kanban-board>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Loading...</span>
            </div>
        </div>
    </main>
</f:section>

</html>
