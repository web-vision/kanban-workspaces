<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <!-- Board toolbar under the core DocHeader: inline filters (left, rendered
         into #headerFilters by the board component) and search (right) -->
    <header class="workspace-header">
        <div class="header-content">
            <div class="header-filters" id="headerFilters"></div>

            <div class="header-search">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="globalSearch" placeholder="Search records..." class="search-input">
                    <button class="search-clear" id="clearSearch" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <button type="button" class="clear-filters-btn" id="clearAllFilters"
                title="Clear all filters" aria-label="Clear all filters">
                <i class="fas fa-filter-circle-xmark"></i>
            </button>
        </div>
    </header>

    <!-- data-islive: Lit board skips API load when live workspace (inaccessible) -->
    <main
        class="workspace-main"
        data-islive="{f:if(condition: workspaceIsAccessible, then: 'true', else: 'false')}"
        data-avatar="{f:uri.image(src:'EXT:kanban_workspaces/Resources/Public/Icons/user.png')}"
    >
        <f:if condition="{workspaceIsAccessible}">
            <div class="container mt-5">
                <f:be.infobox title="Wait!">You're on live workspace, Please select workspace.</f:be.infobox>
            </div>
        </f:if>
        <f:if condition="{showNoCustomStagesWarning}">
            <div class="container mt-3">
                <f:be.infobox
                    title="{f:translate(key: 'warning.noCustomStages.title', extensionName: 'kanban_workspaces')}">
                    <f:translate key="warning.noCustomStages.message" extensionName="kanban_workspaces" />
                </f:be.infobox>
            </div>
        </f:if>

        <!-- Kanban board web component. Registered by @web-vision/kanban-workspaces/App.js
             and initialised from window.WorkspaceConfig. Renders the filter sidebar, the
             board columns/cards and the preview / send-to-stage / assign modals. -->
        <typo3-kanban-board></typo3-kanban-board>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Loading...</span>
            </div>
        </div>
    </main>
</f:section>

</html>
