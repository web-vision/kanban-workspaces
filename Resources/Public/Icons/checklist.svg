<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #f2f2f2;
      --primary: #231f20;
      --secondary: #f2f2f2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --primary: #ffffff;
        --secondary: #121212;
      }
    }
  </style>

  <!-- Background -->
  <rect width="512" height="512" fill="var(--bg)"/>

  <!-- Clipboard body -->
  <rect x="136" y="120" width="240" height="300" rx="28" fill="var(--primary)"/>

  <!-- Clip top -->
  <rect x="196" y="80" width="120" height="80" rx="28" fill="var(--primary)"/>
  <circle cx="256" cy="100" r="18" fill="var(--bg)"/>

  <!-- Checklist lines -->
  <circle cx="170" cy="190" r="12" fill="var(--bg)"/>
  <rect x="200" y="180" width="140" height="20" rx="10" fill="var(--bg)"/>

  <circle cx="170" cy="240" r="12" fill="var(--bg)"/>
  <rect x="200" y="230" width="140" height="20" rx="10" fill="var(--bg)"/>

  <circle cx="170" cy="290" r="12" fill="var(--bg)"/>
  <rect x="200" y="280" width="140" height="20" rx="10" fill="var(--bg)"/>

  <circle cx="170" cy="340" r="12" fill="var(--bg)"/>
  <rect x="200" y="330" width="140" height="20" rx="10" fill="var(--bg)"/>

  <!-- Check circle -->
  <circle cx="360" cy="300" r="60" fill="var(--primary)"/>
  <polyline points="330,300 350,320 390,270"
            fill="none"
            stroke="var(--bg)"
            stroke-width="18"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>